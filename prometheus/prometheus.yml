# ---------------------------------------------------------------------------
# Prometheus configuration for the local observability stack.
# Scrapes: Prometheus itself, node-exporter and the instrumented sample app.
# Loads alerting + SLO/SLI recording rules from ./rules.
# ---------------------------------------------------------------------------
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: local-docker
    environment: dev

# Wire alerts to the Alertmanager service in docker-compose.
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Recording + alerting rules.
rule_files:
  - /etc/prometheus/rules/recording-rules.yml
  - /etc/prometheus/rules/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: local-host

  - job_name: sample-app
    metrics_path: /metrics
    static_configs:
      - targets: ["sample-app:8000"]
        labels:
          service: sample-app
